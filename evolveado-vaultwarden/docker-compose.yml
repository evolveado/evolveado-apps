version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: evolveado-vaultwarden_server_1
      APP_PORT: 8080
      PROXY_AUTH_ADD: "false"

  server:
    image: vaultwarden/server:1.35.1
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      WEBSOCKET_ENABLED: "true"
      SIGNUPS_ALLOWED: "false"
